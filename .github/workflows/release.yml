name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-golang devscripts

      - name: Prepare debian directory
        run: ln -s packaging/debian debian

      - name: Set version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          DEB_VERSION="1:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "deb_version=${DEB_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        run: |
          dch --newversion "${{ steps.version.outputs.deb_version }}" \
              --distribution stable \
              --force-distribution \
              "Release ${{ steps.version.outputs.tag }}"

      - name: Build package
        run: dpkg-buildpackage -b --no-sign -d

      - name: Collect and rename .deb
        id: artifact
        run: |
          ARCH="${{ matrix.arch }}"
          DEB_FILE=$(ls ../*.deb | head -1)
          DEST="apt-transport-artifact-registry_${ARCH}.deb"
          cp "${DEB_FILE}" "${DEST}"
          echo "deb_file=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: ${{ steps.artifact.outputs.deb_file }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.deb"

